<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダイエットAIアプリ（テスト版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>ダイエットAIアプリ開発中！</h1>
    <p>ユーザー登録を試しましょう</p>
    
    <input type="email" id="user-email" placeholder="メールアドレス"><br>
    <input type="password" id="user-password" placeholder="パスワード"><br><br>
    <button id="signup-btn">ユーザー登録</button>

    <script>
        // 1. 変数名がぶつからないように 'mySupabase' に変更
        const SUPABASE_URL = 'https://bbxtesuqsqwdokangvrj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieHRlc3Vxc3F3ZG9rYW5ndnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTE5MjIsImV4cCI6MjA5MjMyNzkyMn0.XWyt_nddkVJnjYX51AqH1CRe1Wniq7LsFvDVKaoRaa8';
        
        // 変数の宣言（ここが原因①の場所でした）
        const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. HTMLのonclickではなく、JavaScript側でボタンの動きを決める（より確実な方法）
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-password').value;

            console.log("登録開始...", email); // 動作確認用

            const { data, error } = await mySupabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("エラー: " + error.message);
            } else {
                alert("登録成功！SupabaseのUsers画面を確認してください。");
            }
        });
    </script>
</body>
</html>
