<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏に向けて！AIダイエット診断</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #FF4785; --bg: #f0f2f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; }
        .card { background: #fafafa; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e03e75; transform: translateY(-2px); }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        #ai-response { background: #fffde7; border-left: 5px solid #fbc02d; padding: 15px; margin-top: 20px; border-radius: 4px; display: none; }
        .loading { display: none; text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 夏までに絞る！ダイエットAI</h1>

    <div class="card">
        <label>1. アカウント準備</label>
        <input type="email" id="user-email" placeholder="メールアドレス">
        <input type="password" id="user-password" placeholder="パスワード">
        <button id="signup-btn">ログイン / 登録</button>
    </div>

    <div class="card">
        <label>2. 身体の写真を撮影・選択</label>
        <input type="file" id="photo-input" accept="image/*">
        <img id="preview" src="" alt="プレビュー">
        <button id="upload-btn" style="margin-top: 15px;">AIで体型を分析する</button>
    </div>

    <div class="loading" id="loader">AIがあなたの体型を分析中...🔥</div>
    <div id="ai-response">
        <strong>🏃‍♂️ AIトレーナーのアドバイス:</strong>
        <p id="advice-text"></p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bbxtesuqsqwdokangvrj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieHRlc3Vxc3F3ZG9rYW5ndnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTE5MjIsImV4cCI6MjA5MjMyNzkyMn0.XWyt_nddkVJnjYX51AqH1CRe1Wniq7LsFvDVKaoRaa8';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 写真を選んだらプレビューを表示する
    document.getElementById('photo-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(f) {
                const preview = document.getElementById('preview');
                preview.src = f.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // 登録ボタン（前回と同じ）
    document.getElementById('signup-btn').addEventListener('click', async () => {
        const email = document.getElementById('user-email').value;
        const password = document.getElementById('user-password').value;
        const { error } = await mySupabase.auth.signUp({ email, password });
        if (error) alert(error.message); else alert("準備完了！");
    });

    // 送信ボタン（ここにGemini連携を足していきます）
    document.getElementById('upload-btn').addEventListener('click', async () => {
        const fileInput = document.getElementById('photo-input');
        const file = fileInput.files[0];
        if (!file) return alert("写真を選んでね！");

        // 表示の切り替え
        document.getElementById('loader').style.display = 'block';
        document.getElementById('ai-response').style.display = 'none';

        // --- ここでSupabaseへの保存を実行 ---
        const { data: { user } } = await mySupabase.auth.getUser();
        const fileName = `${user.id}/${Date.now()}.jpg`;
        const { error } = await mySupabase.storage.from('body-pics').upload(fileName, file);

        if (error) {
            alert("保存失敗: " + error.message);
            document.getElementById('loader').style.display = 'none';
        } else {
            // 保存成功！次はここにGeminiのコードを書きます
            alert("画像保存成功！次にAI連携コードを追加します。");
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
</body>
</html>
