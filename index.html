<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダイエットAIアプリ（テスト版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>ダイエットAIアプリ開発中！</h1>
    <p>まずはユーザー登録を試してみよう</p>
    
    <input type="email" id="email" placeholder="メールアドレス"><br>
    <input type="password" id="password" placeholder="パスワード"><br><br>
    <button onclick="signUp()">ユーザー登録</button>

    <script>
        // あなたのSupabaseの情報をここに入れる
        const SUPABASE_URL = 'https://bbxtesuqsqwdokangvrj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieHRlc3Vxc3F3ZG9rYW5ndnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTE5MjIsImV4cCI6MjA5MjMyNzkyMn0.XWyt_nddkVJnjYX51AqH1CRe1Wniq7LsFvDVKaoRaa8';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("エラーが発生しました: " + error.message);
            } else {
                alert("登録成功！SupabaseのUsers画面を確認してね！");
            }
        }
    </script>
</body>
</html>
