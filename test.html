<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏までに絞る！AIパーソナルトレーナー</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #FF4785; --bg: #f0f2f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; }
        #user-status-container { text-align: center; margin-bottom: 20px; padding: 10px; border-radius: 10px; background: #fafafa; font-size: 0.9rem; }
        .card { background: #fafafa; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e03e75; transform: translateY(-2px); }
        #logout-btn { background: #999; padding: 5px 12px; width: auto; font-size: 0.8rem; margin: 5px auto; display: none; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 2px solid #eee; }
        #ai-response { background: #fffde7; border-left: 5px solid #fbc02d; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; line-height: 1.6; }
        .loading { display: none; text-align: center; color: var(--primary); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 夏までに絞る！AIトレーナー</h1>

    <div id="user-status-container">
        <div id="user-status">確認中...</div>
        <button id="logout-btn">ログアウト</button>
    </div>

    <div class="card" id="auth-section">
        <label>1. アカウントログイン</label>
        <input type="email" id="user-email" placeholder="メールアドレス">
        <input type="password" id="user-password" placeholder="パスワード">
        <button id="signup-btn">ログイン / 登録</button>
    </div>

    <div class="card">
        <label>2. 今日の写真をアップロード</label>
        <input type="file" id="photo-input" accept="image/*">
        <img id="preview" alt="プレビュー">
        <button id="upload-btn" style="margin-top: 15px;">AIに分析してもらう</button>
    </div>

    <div class="loading" id="loader">熱血トレーナーが画像を確認中...🔥</div>
    <div id="ai-response">
        <strong>🏃‍♂️ AIトレーナーのアドバイス:</strong>
        <p id="advice-text" style="white-space: pre-wrap;"></p>
    </div>
</div>

<script>
    // --- 設定 ---
    const SUPABASE_URL = 'https://bbxtesuqsqwdokangvrj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieHRlc3Vxc3F3ZG9rYW5ndnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTE5MjIsImV4cCI6MjA5MjMyNzkyMn0.XWyt_nddkVJnjYX51AqH1CRe1Wniq7LsFvDVKaoRaa8';
    
    // GitHub Models (無料枠)
    const part1 = "ghp_wSLZ6GfrxZkd9R77";
    const part2 = "kzvPyaSCkGvkOy19V3Fs";
    const GITHUB_TOKEN = part1 + part2;
    const ENDPOINT = "https://models.inference.ai.azure.com/chat/completions";
    // 無料で最も安定しているモデルを指定
    const MODEL_NAME = "gpt-4o-mini"; 

    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUserStatus() {
        const { data: { user } } = await mySupabase.auth.getUser();
        const statusArea = document.getElementById('user-status');
        const authSection = document.getElementById('auth-section');
        const logoutBtn = document.getElementById('logout-btn');
        if (user) {
            statusArea.innerHTML = `✅ <strong>${user.email}</strong>`;
            authSection.style.display = "none";
            logoutBtn.style.display = "block";
        } else {
            statusArea.innerHTML = "❌ ログインしていません";
            authSection.style.display = "block";
            logoutBtn.style.display = "none";
        }
    }
    checkUserStatus();

    document.getElementById('signup-btn').addEventListener('click', async () => {
        const email = document.getElementById('user-email').value;
        const password = document.getElementById('user-password').value;
        if(!email || !password) return alert("入力してください");
        let { error } = await mySupabase.auth.signInWithPassword({ email, password });
        if (error) await mySupabase.auth.signUp({ email, password });
        checkUserStatus();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await mySupabase.auth.signOut();
        location.reload(); // セッションクリアのためリロード推奨
    });

    document.getElementById('photo-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = f => {
                document.getElementById('preview').src = f.target.result;
                document.getElementById('preview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('upload-btn').addEventListener('click', async () => {
        const file = document.getElementById('photo-input').files[0];
        if (!file) return alert("写真を選んで！");
        const { data: { user } } = await mySupabase.auth.getUser();
        if (!user) return alert("ログインが必要です");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('ai-response').style.display = 'none';

        try {
            // 画像変換 (Base64)
            const base64Image = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            // 履歴取得
            const { data: history } = await mySupabase.from('diet_history').select('advice').eq('user_id', user.id).order('created_at', { ascending: false }).limit(1);
            const prevAdvice = (history && history.length > 0) ? history[0].advice : "初回診断";

            // GitHub Models 呼び出し
            const response = await fetch(ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [
                        {
                            role: "user",
                            content: [
                                { type: "text", text: `あなたはプロのパーソナルトレーナーです。
この画像はフィットネスの進捗を確認するためのボディチェック写真です。
健康的な体づくりという観点から、筋肉のつき方や引き締めポイントを日本語で熱くポジティブに分析・指導してください。
※医療診断ではなく、あくまでトレーニングのモチベーションアップのための助言として回答してください。前回のアドバイス：「${prevAdvice}」` },
                                { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
                            ]
                        }
                    ]
                })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error?.message || "AIエラー");

            const advice = result.choices[0].message.content;

            // 保存
            try {
                await mySupabase.from('diet_history').insert([{ user_id: user.id, advice: advice }]);
            } catch (e) { console.warn("保存失敗:", e); }

            // 表示
            document.getElementById('advice-text').innerText = advice;
            document.getElementById('ai-response').style.display = 'block';

        } catch (e) {
            alert("トラブル発生: " + e.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
</body>
</html>
